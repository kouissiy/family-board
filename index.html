<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>家族ボード</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 10px;
    }

    #album {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    #album img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>📸 家族アルバム</h2>
<div id="album"></div>

<script>
async function loadIssues() {
  const url = "https://api.github.com/repos/kouissiy/family-board/issues";

  const res = await fetch(url);
  const issues = await res.json();

  const container = document.getElementById("album");

  issues.forEach(issue => {
    if (!issue.body) return;

    const match = issue.body.match(/!\[.*?\]\((https:\/\/.*?)\)/);

    if (match) {
      const imgUrl = match[1];

      const div = document.createElement("div");

      div.innerHTML = `
        <img src="${imgUrl}">
      `;

      container.appendChild(div);
    }
  });
}

loadIssues();
</script>

</body>
</html>
